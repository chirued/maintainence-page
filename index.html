<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, Arial, sans-serif;
}

/* Background */
body {
  min-height: 100vh;
  background: white;
  color: linear-gradient(135deg, #ff0000, #b30000);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Floating pattern */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(rgba(255,255,255,0.15) 2px, transparent 2px);
  background-size: 60px 60px;
  animation: moveBg 20s linear infinite;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  100% { transform: translate(-100px,-100px); }
}

/* Logo top-left */
.logo {
  position: absolute;
  top: 25px;
  left: 30px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 3;
}

.logo img {
  width:90px;
  height: 60px;
}

.logo span {
  font-size: 18px;
  font-weight: bold;
}

/* Center content */
.container {
  position: relative;
  z-index: 2;
  max-width: 700px;
  width: 90%;
  text-align: center;
}

/* Text */
.badge {
  font-size: 13px;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

h1 {
  font-size: 52px;
  line-height: 1.2;
  margin-bottom: 20px;
}

p {
  font-size: 18px;
  opacity: 0.9;
  margin-bottom: 30px;
}

/* Features */
.features {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 40px;
}

.feature {
  text-align: center;
  font-size: 14px;
}

.feature span {
  font-size: 26px;
  display: block;
  margin-bottom: 8px;
}

/* Email */
.email-box {
  display: flex;
  justify-content: center;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.email-box input {
  padding: 14px;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  width: 60%;
}

.email-box input::placeholder {
  color: #eee;
}

.email-box button {
  padding: 14px 20px;
  border: none;
  background: white;
  color: #ff0000;
  font-weight: bold;
  cursor: pointer;
}

/* Footer */
.footer {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0.9;
}

/* Responsive */
@media(max-width: 600px) {
  h1 {
    font-size: 36px;
  }

  .features {
    flex-direction: column;
    gap: 20px;
  }

  .email-box {
    flex-direction: column;
  }

  .email-box input {
    width: 100%;
  }
}
</style>
</head>

<body>

<!-- Logo -->
<div class="logo">
  <!-- Replace with your logo -->
  <img src="visu-logo.jpeg" alt="Logo">
</div>

<!-- Center Content -->
<div class="container">

  <div class="badge">• WE’LL BE BACK SOON •</div>

  <h1>We’re Under Maintenance</h1>

  <p>
    We’re working hard to improve your experience.<br>
    Our website will be back online shortly!
  </p>

  <div class="features">
    <div class="feature">
      <span>🔧</span>
      Improving<br>Services
    </div>

    <div class="feature">
      <span>⚡</span>
      Better<br>Performance
    </div>

    <div class="feature">
      <span>🚀</span>
      New Features<br>Coming Soon
    </div>
  </div>

  <div class="email-box">
    <h3> For any inquiries, please feel free to call <label style="font-weight: bold"> 988 988 7157, <p>888 676 2222</p></label></h3>
  </div>

</div>

<div class="footer">
  Thank you for your patience ❤️
</div>

</body>
</html>
